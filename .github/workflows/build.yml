# Build the FreeCCR-go desktop app on each native OS runner (Wails needs the
# platform webview; RAW needs libraw — neither cross-compiles cleanly). Runs on
# demand and on version tags; uploads a per-platform artifact, and on a `v*` tag
# assembles them into a GitHub Release.
name: build

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install deps (WebKitGTK + libraw + AppImage tooling)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libraw-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
            patchelf file imagemagick librsvg2-dev desktop-file-utils xvfb
      - name: Build AppImage
        run: bash scripts/build_linux_appimage.sh
      - name: Smoke-test the AppImage (headless)
        run: |
          export APPIMAGE_EXTRACT_AND_RUN=1 LIBGL_ALWAYS_SOFTWARE=1
          xvfb-run -a ./FreeCCR-go-x86_64.AppImage >/tmp/app.log 2>&1 &
          APP=$!
          sleep 10
          if kill -0 "$APP" 2>/dev/null; then
            echo "launched and stayed alive under xvfb ✓"; kill "$APP" 2>/dev/null || true
          else
            echo "::error::AppImage exited early:"; cat /tmp/app.log; exit 1
          fi
      - name: Clean-room test (container with no webkit/gtk/libraw)
        # Proves self-containment: a base image with only the host libs an AppImage
        # is allowed to assume (glibc, X, GL) — deliberately NO webkit2gtk, gtk3,
        # or libraw. If it launches here, those are genuinely bundled.
        run: |
          docker run --rm -v "$PWD:/w" -w /w ubuntu:24.04 bash -c '
            set -e
            apt-get update -qq
            # Only the host-base libs an AppImage may assume (the graphics-driver
            # + X stack that build_linux_appimage.sh deliberately does NOT bundle).
            # No gtk3 / webkit2gtk / libraw / glib / fontconfig — those must be
            # bundled, or the app will not launch here.
            DEBIAN_FRONTEND=noninteractive apt-get install -y -qq xvfb ca-certificates \
              libgl1 libglx0 libglvnd0 libegl1 libgles2 libgbm1 libdrm2 \
              libx11-6 libx11-xcb1 libxcb1 libxext6 libxrender1 libxrandr2 libxi6 \
              libxcursor1 libxfixes3 libxdamage1 libxcomposite1 libxtst6 libxau6 \
              libxdmcp6 libxkbcommon0 libxshmfence1 \
              libwayland-client0 libwayland-egl1 libwayland-cursor0 >/dev/null
            export APPIMAGE_EXTRACT_AND_RUN=1 LIBGL_ALWAYS_SOFTWARE=1
            xvfb-run -a ./FreeCCR-go-x86_64.AppImage >/tmp/c.log 2>&1 &
            P=$!; sleep 12
            if kill -0 $P 2>/dev/null; then echo "clean-room launch ✓"; kill $P 2>/dev/null || true;
            else echo "::error::failed in clean room:"; cat /tmp/c.log; exit 1; fi
          '
      - uses: actions/upload-artifact@v4
        with:
          name: FreeCCR-go-linux
          path: FreeCCR-go-x86_64.AppImage

  macos:
    runs-on: macos-14
    # These come from repo secrets. If MACOS_CERTIFICATE is unset the cert-import
    # and notarization steps no-op and the build falls back to ad-hoc signing, so
    # the workflow still succeeds before secrets are configured.
    env:
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PWD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install libraw
        run: brew install libraw
      - name: Import Developer ID certificate
        if: env.MACOS_CERTIFICATE != ''
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KPWD="$(uuidgen)"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KPWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPWD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm "$RUNNER_TEMP/cert.p12"
      - name: Build, sign & notarize .app
        run: make app
      - name: Zip bundle
        run: ditto -c -k --keepParent bin/FreeCCR-go.app FreeCCR-go-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: FreeCCR-go-macos
          path: FreeCCR-go-macos.zip

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      # Go + gcc + libraw from MSYS2/MinGW so cgo can link libraw.
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-go
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-libraw
      - name: Build
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS_ALLOW: ".*"
        run: |
          go build -tags "desktop,production,libraw" -ldflags "-H windowsgui" \
            -o FreeCCR-go.exe ./cmd/freeccr-app
      - name: Bundle MinGW DLLs
        # Walk the exe's PE import closure and copy every dependency that lives in
        # /mingw64/bin (libraw + the MinGW runtime) next to it, so the app runs on
        # a clean Windows box. System DLLs (in C:\Windows) are not in /mingw64/bin
        # and are left out.
        run: |
          mkdir -p dist
          cp FreeCCR-go.exe dist/
          collect() {
            objdump -p "$1" 2>/dev/null | awk '/DLL Name:/ {print $3}' | while read -r dll; do
              if [ -f "/mingw64/bin/$dll" ] && [ ! -f "dist/$dll" ]; then
                cp "/mingw64/bin/$dll" "dist/$dll"
                collect "/mingw64/bin/$dll"
              fi
            done
          }
          collect FreeCCR-go.exe
          echo "bundled: $(cd dist && echo *.dll)"
      - name: Zip bundle
        run: |
          powershell.exe -NoProfile -Command "Compress-Archive -Path dist/* -DestinationPath FreeCCR-go-windows.zip -Force"
      - uses: actions/upload-artifact@v4
        with:
          name: FreeCCR-go-windows
          path: FreeCCR-go-windows.zip

  # On a version tag, collect the three platform builds into a GitHub Release.
  release:
    needs: [linux, macos, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Stage release assets
        run: |
          mkdir -p out
          cp dist/FreeCCR-go-macos/FreeCCR-go-macos.zip       out/FreeCCR-go-macos.zip
          cp dist/FreeCCR-go-windows/FreeCCR-go-windows.zip   out/FreeCCR-go-windows.zip
          cp dist/FreeCCR-go-linux/FreeCCR-go-x86_64.AppImage out/FreeCCR-go-linux.AppImage
          ls -l out
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "FreeCCR-go ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            out/FreeCCR-go-macos.zip \
            out/FreeCCR-go-windows.zip \
            out/FreeCCR-go-linux.AppImage
