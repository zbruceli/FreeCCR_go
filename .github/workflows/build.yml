# Build the FreeCCR-go desktop app on each native OS runner (Wails needs the
# platform webview; RAW needs libraw — neither cross-compiles cleanly). Runs on
# demand and on version tags; uploads a per-platform artifact, and on a `v*` tag
# assembles them into a GitHub Release.
name: build

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install deps (WebKitGTK + libraw)
        run: |
          sudo apt-get update
          sudo apt-get install -y libraw-dev libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Build
        run: |
          CGO_ENABLED=1 go build -tags "desktop,production,libraw,webkit2_41" \
            -o FreeCCR-go-linux ./cmd/freeccr-app
      - uses: actions/upload-artifact@v4
        with:
          name: FreeCCR-go-linux
          path: FreeCCR-go-linux

  macos:
    runs-on: macos-14
    # These come from repo secrets. If MACOS_CERTIFICATE is unset the cert-import
    # and notarization steps no-op and the build falls back to ad-hoc signing, so
    # the workflow still succeeds before secrets are configured.
    env:
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PWD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install libraw
        run: brew install libraw
      - name: Import Developer ID certificate
        if: env.MACOS_CERTIFICATE != ''
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KPWD="$(uuidgen)"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KPWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPWD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm "$RUNNER_TEMP/cert.p12"
      - name: Build, sign & notarize .app
        run: make app
      - name: Zip bundle
        run: ditto -c -k --keepParent bin/FreeCCR-go.app FreeCCR-go-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: FreeCCR-go-macos
          path: FreeCCR-go-macos.zip

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      # Go + gcc + libraw from MSYS2/MinGW so cgo can link libraw.
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-go
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-libraw
      - name: Build
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS_ALLOW: ".*"
        run: |
          go build -tags "desktop,production,libraw" -ldflags "-H windowsgui" \
            -o FreeCCR-go.exe ./cmd/freeccr-app
      - uses: actions/upload-artifact@v4
        with:
          name: FreeCCR-go-windows
          path: FreeCCR-go.exe

  # On a version tag, collect the three platform builds into a GitHub Release.
  release:
    needs: [linux, macos, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Stage release assets
        run: |
          mkdir -p out
          cp dist/FreeCCR-go-macos/FreeCCR-go-macos.zip out/FreeCCR-go-macos.zip
          cp dist/FreeCCR-go-windows/FreeCCR-go.exe     out/FreeCCR-go-windows.exe
          cp dist/FreeCCR-go-linux/FreeCCR-go-linux     out/FreeCCR-go-linux
          ls -l out
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "FreeCCR-go ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            out/FreeCCR-go-macos.zip \
            out/FreeCCR-go-windows.exe \
            out/FreeCCR-go-linux
